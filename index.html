<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 231 - Austin Anumudu</title>
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css" media="screen and (min-width: 768px)">
    <script src="scripts/course.js" defer></script>
</head>
<body>
    <header>
        <div class="profile-header">
            <img src="images/profile.webp" alt="Profile" class="logo">
            <h1>Austin Anumudu</h1>
        </div>
        <nav>
            <ul class="navigation">
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#">CHAMBER PROJECT</a></li>
                <li><a href="#">FINAL PROJECT</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="main-grid">
            <section class="card">
                <h2 class="card-header">About Me</h2>
                <div class="card-content">
                    <p>Welcome to my portal. I am a student in Lagos, Nigeria, working on my Web Development certification.</p>
                </div>
            </section>
            <section class="card">
                <h2 class="card-header">Student Photo</h2>
                <div class="card-content photo-box">
                    <img src="images/student-photo.webp" alt="Austin Anumudu">
                </div>
            </section>
        </div>

        <section class="card">
            <h2 class="card-header">Web Certificate Courses</h2>
            <div class="card-content">
                <div class="filters">
                    <button id="all">All</button>
                    <button id="cse">CSE</button>
                    <button id="wdd">WDD</button>
                </div>
                <div id="course-list"></div>
                <p class="credit-msg">Total credits: <span id="total-credits"></span></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <img src="images/linkedin.png" alt="LinkedIn">
            <img src="images/github.png" alt="GitHub">
            <img src="images/x.png" alt="X">
        </div>
        <p>&copy; <span id="currentyear"></span> ● Austin Anumudu ● Lagos, Nigeria</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
