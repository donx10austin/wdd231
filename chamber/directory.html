<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos Chamber Directory - Austin Anumudu</title>
    <meta name="description" content="Official Business Directory for the Lagos Chamber of Commerce. Explore innovative Nigerian companies and industry leaders.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css" media="screen and (min-width: 768px)">
    <script src="scripts/directory.js" defer></script>
</head>
<body>
    <header>
        <div class="branding">
            <img src="images/logo.jpg" alt="Lagos Chamber Logo" class="logo">
            <h1>Lagos Chamber of Commerce</h1>
        </div>
        <nav>
            <button id="menu" aria-label="Toggle Menu">≡</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="directory.html" class="active">Directory</a></li>
                <li><a href="join.html">Join</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><button id="dark-mode" title="Toggle Dark Mode">◑</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-box">
                <h2>LCC Business Directory</h2>
                <p>Connecting Lagos to the World</p>
            </div>
        </section>

        <div class="view-toggle">
            <button id="grid-btn" class="active">Grid View</button>
            <button id="list-btn">List View</button>
        </div>

        <article id="members" class="grid"></article>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-info">
                <p><strong>Lagos Chamber of Commerce</strong></p>
                <p>12 Marina Road, Lagos Island</p>
                <p>info@lagoschamber.ng</p>
            </div>
            <div class="footer-social">
                <a href="https://youtube.com" target="_blank"><img src="images/youtube.png" alt="YouTube" class="social-icon"></a>
                <a href="https://twitter.com" target="_blank"><img src="images/x-logo.png" alt="Twitter" class="social-icon"></a>
                <a href="https://linkedin.com" target="_blank"><img src="images/linkedin-logo.png" alt="LinkedIn" class="social-icon"></a>
            </div>
            <div class="footer-meta">
                <p>&copy;<span id="currentyear"></span> | Austin Anumudu | WDD 231</p>
                <p id="lastModified"></p>
            </div>
        </div>
    </footer>
</body>
</html>
