<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Directory | Lagos Chamber of Commerce</title>
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css" media="(min-width: 600px)">
    <script src="scripts/directory.js" defer></script>
</head>
<body>
    <header>
        <div class="header-container">
            <div class="brand">
                <img src="images/chamber-og.jpg" alt="Lagos Chamber Logo" id="logo">
                <h1>Lagos Chamber of Commerce</h1>
            </div>
            <nav>
                <button id="menu-btn" aria-label="Toggle Menu">☰</button>
                <ul class="nav-links">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="directory.html" class="active">DIRECTORY</a></li>
                    <li><a href="join.html">JOIN</a></li>
                    <li><a href="discover.html">DISCOVER</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="view-toggle">
            <button id="grid">Grid View</button>
            <button id="list">List View</button>
        </div>
        <article id="member-container" class="grid"></article>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <p><strong>Lagos Chamber of Commerce</strong></p>
                <p>12 Marina Road, Lagos Island</p>
                <p>info@lagoschamber.ng</p>
            </div>
            <div class="footer-middle">
                <img src="images/youtube.png" alt="YouTube">
                <img src="images/twitter-logo.png" alt="Twitter">
                <img src="images/linkedin-logo.png" alt="LinkedIn">
            </div>
            <div class="footer-right">
                <p>WDD231 | Austin Anumudu</p>
                <p>&copy; <span id="currentyear"></span> Lagos Chamber</p>
                <p id="lastModified"></p>
            </div>
        </div>
    </footer>
</body>
</html>
